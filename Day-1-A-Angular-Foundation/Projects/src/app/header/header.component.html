<!--
  header.component.html — Template for HeaderComponent.

  WHAT THIS TEMPLATE DEMONSTRATES:
  - Interpolation {{ title }} — displaying the @Input() value in the template
  - Simple, focused template — one component, one job: show the page title
-->

<header class="header-banner">
  <!-- {{ title }} displays the value passed in via @Input() from the parent -->
  <h1 class="header-title">{{ title }}</h1>
</header>
