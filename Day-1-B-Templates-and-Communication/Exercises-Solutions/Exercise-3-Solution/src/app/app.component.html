<!-- Exercise 3: Template Reference Variables — SOLUTION -->
<!-- Demonstrates #ref variables and passing ref values to event handlers -->

<div class="quick-add">

  <h1>Quick-Add Tasks</h1>

  <div class="form-row">
    <!-- Template reference variable #taskInput — gives direct access to this DOM element -->
    <input #taskInput type="text" placeholder="Task name...">

    <!-- Template reference variable #prioritySelect — gives direct access to this select -->
    <select #prioritySelect>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>

    <!-- Event binding: passes both ref values to the handler at click time -->
    <button (click)="onAddTask(taskInput.value, prioritySelect.value)">Add Task</button>
  </div>

  <!-- Interpolation: displays the last added task name -->
  <p class="info">Last added: {{ lastAdded }}</p>

  <!-- Interpolation: displays the total task count -->
  <p class="info">Total tasks: {{ tasks.length }}</p>

  <!-- This list will show tasks once added -->
  <ul class="task-list">
    <!-- Tasks will appear here after the method is implemented -->
  </ul>

</div>
