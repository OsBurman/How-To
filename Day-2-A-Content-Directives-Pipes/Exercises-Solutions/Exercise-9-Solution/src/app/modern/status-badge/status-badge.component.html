<!-- modern/status-badge/status-badge.component.html — Exercise 9 SOLUTION -->
<!-- CONCEPT: @switch / @case replaces [ngSwitch] / *ngSwitchCase -->

<!--
  CONVERSION SUMMARY:

  BEFORE (legacy):
    <span [ngSwitch]="status">
      <span *ngSwitchCase="'available'" class="badge badge-available">Available</span>
      <span *ngSwitchCase="'checked-out'" class="badge badge-checked-out">Checked Out</span>
      <span *ngSwitchCase="'reserved'" class="badge badge-reserved">Reserved</span>
      <span *ngSwitchDefault class="badge">Unknown</span>
    </span>

  AFTER (modern):
    @switch (status) {
      @case ('available') { ... }
      @case ('checked-out') { ... }
      @default { ... }
    }

  Key differences:
  - @switch is a block — no wrapper element needed
  - @case uses parentheses: @case ('available') — not a directive attribute
  - @default replaces *ngSwitchDefault
  - No [ngSwitch] wrapper element is rendered in the DOM
  - Each class is hardcoded per @case — [ngClass] is not needed here
-->

@switch (status) {
  @case ('available') {
    <span class="badge badge-available">Available</span>
  }
  @case ('checked-out') {
    <span class="badge badge-checked-out">Checked Out</span>
  }
  @case ('reserved') {
    <span class="badge badge-reserved">Reserved</span>
  }
  @default {
    <span class="badge">Unknown</span>
  }
}
