  CONCEPT SUMMARY:
  - @let    — defines a template-local variable; re-evaluates on change detection (NOT a signal)
  - @if     — conditionally renders a block; @else references an <ng-template>
  - @for    — iterates over an array; track is REQUIRED
  - ng-container — invisible grouping element; adds no DOM node
  - ng-template  — deferred block; renders only when referenced (e.g., by @else)
-->
