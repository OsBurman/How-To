<div class="product-list">
  <h2>Product Catalogue</h2>

  <table class="product-table">
    <thead>
      <tr>
        <th>Product</th>
        <th>Category</th>
        <th>Price</th>
        <th>Launch Date</th>
      </tr>
    </thead>
    <tbody>
      @for (product of products; track product.id) {
        <tr class="product-row">
          <td class="product-name">{{ product.name }}</td>

          <!-- TODO Step 3: apply | uppercase to the category -->
          <td>{{ product.category }}</td>

          <!-- TODO Step 2: apply | currency to the price -->
          <td>{{ product.price }}</td>

          <!-- TODO Step 1: apply | date:'mediumDate' to the launch date -->
          <td>{{ product.launchDate }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
