<!--
  LEGACY REFERENCE — what this template currently does in src/app/status-badge/
  ─────────────────────────────────────────────────────────────────────────────
  <span [ngSwitch]="status">
    <span *ngSwitchCase="'available'"   class="badge badge-available">Available</span>
    <span *ngSwitchCase="'checked-out'" class="badge badge-checked-out">Checked Out</span>
    <span *ngSwitchCase="'reserved'"    class="badge badge-reserved">Reserved</span>
    <span *ngSwitchDefault              class="badge">Unknown</span>
  </span>

  [ngSwitch] + *ngSwitchCase is the legacy structural directive pattern.
  Modern Angular replaces it with @switch / @case / @default blocks.
-->
