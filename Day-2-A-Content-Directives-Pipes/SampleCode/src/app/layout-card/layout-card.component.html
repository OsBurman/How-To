<!--
  layout-card.component.html — Named ng-content Slots

  Each <ng-content select="..."> accepts only projected content
  whose element matches the CSS selector in the select attribute.

  select="[slot=header]" matches any element with attribute slot="header".
  select="[slot=body]"   matches any element with attribute slot="body".
  select="[slot=footer]" matches any element with attribute slot="footer".

  The parent uses:
    <div slot="header">...</div>
    <div slot="body">...</div>
    <div slot="footer">...</div>

  Content that doesn't match any select is silently discarded
  (there is no catch-all default slot here).
-->

<div class="layout-card">

  <!-- Header slot: receives elements with slot="header" from the parent -->
  <div class="layout-card__header">
    <ng-content select="[slot=header]"></ng-content>
  </div>

  <!-- Body slot: receives elements with slot="body" from the parent -->
  <div class="layout-card__body">
    <ng-content select="[slot=body]"></ng-content>
  </div>

  <!-- Footer slot: receives elements with slot="footer" from the parent -->
  <div class="layout-card__footer">
    <ng-content select="[slot=footer]"></ng-content>
  </div>

</div>
