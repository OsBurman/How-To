<!--
  card.component.html — Single-Slot Content Projection

  The <ng-content> tag is the "slot" where projected content appears.
  Whatever the parent puts between <app-card> tags replaces <ng-content>.

  Example parent usage:
    <app-card>
      <h2>My Title</h2>
      <p>This paragraph gets projected into the card.</p>
    </app-card>
-->

<!-- Card wrapper with styled border and padding -->
<div class="card">
  <!-- Single default slot — ALL projected content lands here -->
  <ng-content></ng-content>
</div>
