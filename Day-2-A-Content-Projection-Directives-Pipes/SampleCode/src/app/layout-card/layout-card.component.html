<!--
  layout-card.component.html — Named ng-content Slots

  Three named slots: header, body, footer.
  The parent uses CSS selectors to target each slot:

  Example parent usage:
    <app-layout-card>
      <div header>Movie Title</div>
      <div body>Description of the movie...</div>
      <div footer>Released: 2025</div>
    </app-layout-card>

  The select attribute on ng-content matches elements by:
  - Attribute:  select="[header]"   matches  <div header>
  - CSS class:  select=".body"      matches  <div class="body">
  - Element:    select="h2"         matches  <h2>

  In this example we use attribute selectors for clarity.
-->

<div class="layout-card">

  <!-- HEADER slot — matches elements with the "header" attribute -->
  <div class="layout-card__header">
    <ng-content select="[header]"></ng-content>
  </div>

  <!-- BODY slot — matches elements with the "body" attribute -->
  <div class="layout-card__body">
    <ng-content select="[body]"></ng-content>
  </div>

  <!-- FOOTER slot — matches elements with the "footer" attribute -->
  <div class="layout-card__footer">
    <ng-content select="[footer]"></ng-content>
  </div>

</div>
