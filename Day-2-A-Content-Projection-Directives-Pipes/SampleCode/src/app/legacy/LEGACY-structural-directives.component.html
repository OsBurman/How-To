<h2>Legacy Structural Directives (Read-Only Reference)</h2>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- LEGACY *ngIf with else                                                      -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<!--
  LEGACY PATTERN:
    *ngIf="condition; else elseBlock"
    The else block MUST be a separate <ng-template> with a template ref (#).
    This is verbose — you need two elements to express one conditional.

  MODERN REPLACEMENT:
    @if (condition) {
      ...content...
    } @else {
      ...else content...
    }
    Clean, inline, reads like normal code.
-->
<div *ngIf="tasks.length > 0; else noTasksTemplate">
  <p>{{ tasks.length }} task(s) found</p>
</div>
<ng-template #noTasksTemplate>
  <p>No tasks available.</p>
</ng-template>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- LEGACY *ngIf="expr as name" — local variable from expression                -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<!--
  LEGACY PATTERN:
    *ngIf="currentUser as user"
    This does TWO things at once: checks if currentUser is truthy,
    AND assigns it to a local variable "user". Confusing for beginners
    because it mixes conditional logic with variable assignment.

  MODERN REPLACEMENT:
    @let user = currentUser;
    @if (user) { ... }
    @let separates the variable from the condition — much clearer.
-->
<div *ngIf="currentUser as user">
  <p>Welcome, {{ user.name }} ({{ user.role }})</p>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- LEGACY *ngFor with trackBy                                                  -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<!--
  LEGACY PATTERN:
    *ngFor="let task of tasks; trackBy: trackByTaskId"
    - trackBy is OPTIONAL — most beginners skip it
    - Requires a separate component method that returns the tracking key
    - Without trackBy, Angular destroys and recreates every <li> on change

  MODERN REPLACEMENT:
    @for (task of tasks; track task.id) { ... }
    - track is REQUIRED — you cannot forget it
    - Inline expression — no separate method needed
    - Angular shows a compile error if you omit track
-->
<ul>
  <li *ngFor="let task of tasks; trackBy: trackByTaskId">
    {{ task.title }} — {{ task.status }}
  </li>
</ul>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- LEGACY *ngSwitch                                                            -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<!--
  LEGACY PATTERN:
    [ngSwitch]="expression" on a parent element
    *ngSwitchCase="value" on each child element
    *ngSwitchDefault for the fallback
    Three different directives to express one switch — confusing.

  MODERN REPLACEMENT:
    @switch (expression) {
      @case ('value') { ... }
      @default { ... }
    }
    Reads exactly like a JavaScript switch statement.
-->
<div [ngSwitch]="tasks[0]?.status">
  <span *ngSwitchCase="'todo'" class="status-badge">📋 To Do</span>
  <span *ngSwitchCase="'in-progress'" class="status-badge">🔧 In Progress</span>
  <span *ngSwitchCase="'done'" class="status-badge">✅ Done</span>
  <span *ngSwitchDefault class="status-badge">❓ Unknown</span>
</div>
